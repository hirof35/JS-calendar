<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>究極のJSカレンダー</title>
  <style>
    /* --- CSS変数とテーマ設定 --- */
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-color: #333333;
      --main-color: #007bff;
      --border-color: #ddd;
    }

    body.theme-dark {
      --bg-color: #1e2227;
      --card-bg: #2f3542;
      --text-color: #f1f2f6;
      --main-color: #eccc68;
      --border-color: #444;
    }

    body.theme-sakura {
      --bg-color: #fff0f6;
      --card-bg: #ffffff;
      --text-color: #4a4a4a;
      --main-color: #ff85a2;
      --border-color: #ffdae9;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: 0.3s;
    }

    /* --- レイアウト --- */
    .app-container { width: 380px; }

    .theme-selector { margin-bottom: 15px; }
    .theme-selector button {
      padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin: 0 2px;
    }

    .calendar {
      background: var(--card-bg);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 20px;
    }

    .calendar-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
    }

    .calendar-weekdays, .calendar-days {
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    }

    .calendar-weekdays div { font-weight: bold; padding-bottom: 10px; opacity: 0.6; }

    /* 土日の色分け */
    .calendar-days div:nth-child(7n+1) { color: #ff4757; } /* 日 */
    .calendar-days div:nth-child(7n) { color: #3742fa; }   /* 土 */

    .calendar-days div {
      padding: 12px 0; cursor: pointer; border-radius: 8px; transition: 0.2s;
      position: relative; height: 45px; display: flex; align-items: center; justify-content: center;
    }

    .calendar-days div:hover { background: rgba(0,0,0,0.05); }

    .today { background: var(--main-color) !important; color: #fff !important; }

    .holiday { color: #ff4757 !important; background-color: rgba(255, 71, 87, 0.1); }

    /* 予定ドット */
    .has-event::after {
      content: "●"; position: absolute; bottom: 3px; font-size: 8px;
    }

    /* ドラッグ用 */
    .drop-target { background-color: rgba(0, 123, 255, 0.2) !important; border: 2px dashed var(--main-color); }

    /* --- 検索 & リスト --- */
    .search-container input {
      width: 100%; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color);
      margin-bottom: 15px; outline: none; background: var(--card-bg); color: var(--text-color);
    }

    .event-list-container {
      background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    #eventList { list-style: none; padding: 0; }
    #eventList li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 14px;
    }

    .completed-text { text-decoration: line-through; opacity: 0.5; }

    /* カテゴリカラー */
    .cat-work { border-left: 4px solid #3742fa; }
    .cat-private { border-left: 4px solid #2ed573; }
    .cat-important { border-left: 4px solid #ff4757; }

    /* --- モーダル --- */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
    }
    .modal-content {
      background: var(--card-bg); padding: 25px; border-radius: 15px; width: 300px; text-align: center;
    }
    .modal-content input, .modal-content select {
      width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--border-color); border-radius: 5px;
    }
    .delete-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="theme-selector">
    <button onclick="changeTheme('default')" style="background:#eee">標準</button>
    <button onclick="changeTheme('dark')" style="background:#333; color:#fff">ダーク</button>
    <button onclick="changeTheme('sakura')" style="background:#ffdae9">サクラ</button>
  </div>

  <div class="calendar">
    <div class="calendar-header">
      <button id="prev">&lt;</button>
      <h2 id="monthYear"></h2>
      <button id="next">&gt;</button>
    </div>
    <div class="calendar-weekdays">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="calendar-days" id="calendarDays"></div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="予定を検索..." oninput="renderEventList()">
  </div>

  <div class="event-list-container">
    <h4 style="margin-top:0">予定一覧</h4>
    <ul id="eventList"></ul>
  </div>
</div>

<div id="eventModal" class="modal">
  <div class="modal-content">
    <h3 id="selectedDateText" style="margin-top:0"></h3>
    <input type="time" id="eventTime">
    <input type="text" id="eventInput" placeholder="予定の内容">
    <select id="eventCategory">
      <option value="none">カテゴリなし</option>
      <option value="work">仕事</option>
      <option value="private">プライベート</option>
      <option value="important">重要</option>
    </select>
    <div style="margin-top:15px">
      <button id="saveEvent" style="background:var(--main-color); color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer">保存</button>
      <button id="closeModal" style="background:#ccc; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-left:10px">閉じる</button>
    </div>
  </div>
</div>

<script>
  let date = new Date();
  let holidays = {};
  let selectedDate = "";

  const daysContainer = document.getElementById("calendarDays");
  const monthYearText = document.getElementById("monthYear");
  const eventModal = document.getElementById("eventModal");
  const eventInput = document.getElementById("eventInput");
  const eventTimeInput = document.getElementById("eventTime");
  const eventCategoryInput = document.getElementById("eventCategory");

  // --- 初期化 ---
  async function init() {
    await fetchHolidays();
    const savedTheme = localStorage.getItem("selectedTheme");
    if (savedTheme) changeTheme(savedTheme);
    renderCalendar();
    renderEventList();
    requestNotificationPermission();
    setInterval(checkNotifications, 60000);
  }

  async function fetchHolidays() {
    try {
      const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
      holidays = await res.json();
    } catch (e) { console.error("祝日取得失敗", e); }
  }

  function renderCalendar() {
    daysContainer.innerHTML = "";
    const year = date.getFullYear();
    const month = date.getMonth();
    monthYearText.innerText = `${year}年 ${month + 1}月`;

    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();

    for (let x = firstDayIndex; x > 0; x--) {
      daysContainer.appendChild(document.createElement("div"));
    }

    for (let i = 1; i <= lastDay; i++) {
      const div = document.createElement("div");
      div.innerText = i;
      const dateStr = `${year}-${month + 1}-${i}`;
      const fullDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;

      // 今日の判定
      if (i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
        div.classList.add("today");
      }

      // 祝日・予定ありの判定
      if (holidays[fullDateStr]) {
        div.classList.add("holiday");
        div.title = holidays[fullDateStr];
      }
      if (localStorage.getItem(dateStr)) {
        div.classList.add("has-event");
        const data = JSON.parse(localStorage.getItem(dateStr));
        div.style.color = data.category === 'important' ? '#ff4757' : '';
      }

      // クリックイベント
      div.onclick = () => {
        selectedDate = dateStr;
        document.getElementById("selectedDateText").innerText = `${month + 1}/${i}の予定`;
        const saved = JSON.parse(localStorage.getItem(dateStr) || '{"time":"","title":"","category":"none"}');
        eventTimeInput.value = saved.time;
        eventInput.value = saved.title;
        eventCategoryInput.value = saved.category;
        eventModal.style.display = "flex";
      };

      // ドラッグ&ドロップ
      div.addEventListener("dragover", (e) => { e.preventDefault(); div.classList.add("drop-target"); });
      div.addEventListener("dragleave", () => div.classList.remove("drop-target"));
      div.addEventListener("drop", (e) => {
        e.preventDefault();
        div.classList.remove("drop-target");
        const oldDate = e.dataTransfer.getData("text/plain");
        if (oldDate && oldDate !== dateStr) {
          localStorage.setItem(dateStr, localStorage.getItem(oldDate));
          localStorage.removeItem(oldDate);
          renderCalendar(); renderEventList();
        }
      });

      daysContainer.appendChild(div);
    }
  }

  function renderEventList() {
    const list = document.getElementById("eventList");
    const query = document.getElementById("searchInput").value.toLowerCase();
    list.innerHTML = "";
    let events = [];

    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) {
        const data = JSON.parse(localStorage.getItem(key));
        if (data.title.toLowerCase().includes(query)) {
          events.push({ date: key, ...data });
        }
      }
    }

    events.sort((a, b) => new Date(`${a.date} ${a.time}`) - new Date(`${b.date} ${b.time}`));

    events.forEach(ev => {
      const li = document.createElement("li");
      li.className = `cat-${ev.category}`;
      li.setAttribute("draggable", "true");
      li.ondragstart = (e) => e.dataTransfer.setData("text/plain", ev.date);
      
      li.innerHTML = `
        <div class="${ev.completed ? 'completed-text' : ''}">
          <input type="checkbox" ${ev.completed ? 'checked' : ''} onclick="toggleComplete('${ev.date}')">
          <strong>${ev.date.split('-').slice(1).join('/')}</strong> [${ev.time}] ${ev.title}
        </div>
        <button class="delete-btn" onclick="deleteEvent('${ev.date}')">削除</button>
      `;
      list.appendChild(li);
    });
  }

  // --- アクション ---
  document.getElementById("saveEvent").onclick = () => {
    if (eventInput.value) {
      localStorage.setItem(selectedDate, JSON.stringify({
        time: eventTimeInput.value || "--:--",
        title: eventInput.value,
        category: eventCategoryInput.value,
        completed: false,
        notified: false
      }));
    } else { localStorage.removeItem(selectedDate); }
    eventModal.style.display = "none";
    renderCalendar(); renderEventList();
  };

  document.getElementById("closeModal").onclick = () => eventModal.style.display = "none";

  function deleteEvent(d) {
    if (confirm("削除しますか？")) { localStorage.removeItem(d); renderCalendar(); renderEventList(); }
  }

  function toggleComplete(d) {
    const data = JSON.parse(localStorage.getItem(d));
    data.completed = !data.completed;
    localStorage.setItem(d, JSON.stringify(data));
    renderEventList();
  }

  function changeTheme(t) {
    document.body.className = t === 'default' ? '' : `theme-${t}`;
    localStorage.setItem("selectedTheme", t);
  }

  document.getElementById("prev").onclick = () => { date.setMonth(date.getMonth() - 1); renderCalendar(); };
  document.getElementById("next").onclick = () => { date.setMonth(date.getMonth() + 1); renderCalendar(); };

  // --- 通知 ---
  function requestNotificationPermission() {
    if (Notification.permission !== "granted") Notification.requestPermission();
  }

  function checkNotifications() {
    const now = new Date();
    const key = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    const raw = localStorage.getItem(key);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.time !== "--:--" && !data.notified) {
        const [h, m] = data.time.split(":").map(Number);
        const eventDate = new Date(); eventDate.setHours(h, m, 0);
        if (Math.floor((eventDate - now) / 60000) === 10) {
          new Notification("10分後に予定があります", { body: `${data.time} ${data.title}` });
          data.notified = true;
          localStorage.setItem(key, JSON.stringify(data));
        }
      }
    }
  }

  init();
</script>
</body>
</html>
